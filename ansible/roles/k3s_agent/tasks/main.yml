---
- name: Install K3s agent (worker)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
    INSTALL_K3S_VERSION="{{ k3s_version }}" \
    K3S_URL="https://{{ hostvars[groups['masters'][0]].ansible_host }}:6443" \
    K3S_TOKEN="{{ hostvars[groups['masters'][0]].k3s_token }}" \
    INSTALL_K3S_EXEC="agent --node-ip {{ ansible_host }}" \
    sh -
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s-agent service is started and enabled
  ansible.builtin.systemd:
    name: k3s-agent
    state: started
    enabled: true
