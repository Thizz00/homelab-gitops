# Vault standalone + file storage — pod homelab 16 GB RAM
global:
  tlsDisable: true

injector:
  enabled: false

server:
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        address     = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_disable = 1
      }
      storage "file" {
        path = "/vault/data"
      }
  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

ui:
  enabled: true
