# Traefik v3 — wartosci dopasowane do homelaba 16 GB RAM
deployment:
  replicas: 1

service:
  type: LoadBalancer
  # Prosimy Kube-VIP o konkretny IP z puli (zarezerwowany .200)
  annotations:
    kube-vip.io/loadbalancerIPs: "192.168.4.200"

ports:
  web:
    port: 8000
    expose:
      default: true
    exposedPort: 80
  websecure:
    port: 8443
    expose:
      default: true
    exposedPort: 443
    tls:
      enabled: true

# Dashboard Traefika (przyda sie do podgladu routingu)
ingressRoute:
  dashboard:
    enabled: true

# Oszczednosc RAM — niskie requesty, rozsadne limity
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 128Mi

logs:
  general:
    level: INFO
