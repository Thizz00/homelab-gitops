apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: online-boutique

resources:
  - https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/v0/release/kubernetes-manifests.yaml
  - ingressroute.yaml

patches:
  # Obniza resource requests na wszystkich Deploymentach (gestosc pod 16 GB RAM)
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: "1"
            memory: 512Mi
  # Usuwa frontend-external (LoadBalancer) — wejscie idzie przez Traefik
  - target:
      kind: Service
      name: frontend-external
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: frontend-external
