apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: online-boutique

resources:
  - https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/v0/release/kubernetes-manifests.yaml
  - ingressroute.yaml

# Obniza resource requests na WSZYSTKICH Deploymentach (gestosc pod 16 GB RAM).
# Jeden patch JSON6902 z target.kind=Deployment trafia w kazdy serwis naraz,
# bo kazdy ma dokladnie jeden kontener (index 0).
patches:
  - target:
      kind: Deployment
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: "1"
            memory: 512Mi
